  <script>
// ===== src/music.js =====
// Pure helpers: no DOM, no audio. Easy to reason about and reuse.

// Resolve after `ms` milliseconds. Shared so the bundle has a single
// definition (duplicate top-level consts would collide once inlined).
const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

const NOTE_NAMES = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
const NAME_TO_SEMITONE = {
  C: 0, "C#": 1, DB: 1, D: 2, "D#": 3, EB: 3, E: 4, F: 5,
  "F#": 6, GB: 6, G: 7, "G#": 8, AB: 8, A: 9, "A#": 10, BB: 10, B: 11,
};

// "C4" / "F#3" / "Eb5" -> MIDI number (C4 = 60, middle C).
function noteNameToMidi(name) {
  const m = /^([A-Ga-g][#b]?)(-?\d+)$/.exec(name.trim());
  if (!m) throw new Error(`Bad note name: ${name}`);
  const letter = m[1].toUpperCase();
  const octave = parseInt(m[2], 10);
  const semitone = NAME_TO_SEMITONE[letter];
  if (semitone === undefined) throw new Error(`Bad note name: ${name}`);
  return semitone + (octave + 1) * 12;
}

// MIDI number -> "C4". Uses sharps only (good enough for display).
function midiToName(midi) {
  const octave = Math.floor(midi / 12) - 1;
  return NOTE_NAMES[midi % 12] + octave;
}

// MIDI number -> frequency in Hz (equal temperament, A4 = 440).
function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

// Inclusive random integer in [min, max].
function randInt(min, max) {
  return min + Math.floor(Math.random() * (max - min + 1));
}
function clamp(x, lo, hi) {
  return Math.max(lo, Math.min(hi, x));
}

// Pick one item from `items` with probability proportional to weightFn(item).
function weightedChoice(items, weightFn) {
  const total = items.reduce((sum, it) => sum + weightFn(it), 0);
  let r = Math.random() * total;
  for (const it of items) {
    r -= weightFn(it);
    if (r < 0) return it;
  }
  return items[items.length - 1];
}

// A sample from a normal distribution (Box–Muller). Used to bias the root
// pitch toward a centre while occasionally straying higher/lower.
function randNormal(mean, stdDev) {
  const u = 1 - Math.random();
  const v = Math.random();
  return mean + stdDev * Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}

// Rotate a chord's offsets into its k-th inversion: move the lowest note(s) up
// an octave, then re-base so the new bottom note is 0. Note count is unchanged.
//   [0,4,7] --invert 1--> [3,8,12 -> 0,3,8]   (first inversion)
function invert(offsets, k) {
  let res = offsets.slice();
  for (let n = 0; n < k; n++) {
    const bottom = res[0];
    res = res.slice(1).concat(bottom + 12);
    const base = res[0];
    res = res.map((o) => o - base);
  }
  return res;
}


// ===== src/config.js =====
// ============================================================================
//  EDIT THIS FILE to change what is tested.  Nothing else needs to change.
// ============================================================================
//
//  How selection works (two independent layers, so they don't fight):
//
//   1. countWeights  — decides whether a question has 2, 3 or 4 notes.
//                      This is set DIRECTLY, independent of how many patterns
//                      you list below.  (50 / 35 / 15 -> 50% two-note, etc.)
//
//   2. weight (per pattern) — within a chosen note-count, decides WHICH pattern
//                      you hear.  Higher = more common.  Give rare/odd ones a
//                      weight of 1 so they "appear sometimes" without dominating.
//
//  So adding a new rare interval never changes the 2/3/4 balance, and never
//  takes over — you just give it a low weight.
//
//  Offsets are semitones above the lowest note (0 = the bottom note):
//   0=root 1=m2 2=M2 3=m3 4=M3 5=P4 6=tritone 7=P5 8=m6 9=M6 10=m7 11=M7 12=8ve
//  Triads & 7ths are also heard in random inversions (see randomInversions).
// ============================================================================
const LIBRARY = {
  // --- 2 notes (intervals) --------------------------------------------------
  2: [
    { name: "Perfect fifth",  offsets: [0, 7],  weight: 4 },
    { name: "Major third",    offsets: [0, 4],  weight: 4 },
    { name: "Minor third",    offsets: [0, 3],  weight: 4 },
    { name: "Minor sixth",    offsets: [0, 8],  weight: 3 }, // inversion of M3
    { name: "Major sixth",    offsets: [0, 9],  weight: 3 }, // inversion of m3
    { name: "Perfect fourth", offsets: [0, 5],  weight: 3 }, // inversion of P5
    { name: "Octave",         offsets: [0, 12], weight: 2 },
    { name: "Tritone",        offsets: [0, 6],  weight: 1 }, // dissonant
    { name: "Minor second",   offsets: [0, 1],  weight: 1 }, // semitone, dissonant
    { name: "Major second",   offsets: [0, 2],  weight: 1 }, // dissonant
    { name: "Major seventh",  offsets: [0, 11], weight: 1 }, // dissonant
  ],

  // --- 3 notes (triads + incomplete 7ths) -----------------------------------
  3: [
    { name: "Major triad",      offsets: [0, 4, 7],  weight: 4 },
    { name: "Minor triad",      offsets: [0, 3, 7],  weight: 4 },
    { name: "Sus4 triad",       offsets: [0, 5, 7],  weight: 2 },
    { name: "Diminished triad", offsets: [0, 3, 6],  weight: 2 },
    { name: "Augmented triad",  offsets: [0, 4, 8],  weight: 1 },
    // "7th with a note missing" (shell voicings): root + 3rd + 7th, no 5th.
    { name: "Dom 7th (no 5th)", offsets: [0, 4, 10], weight: 1 },
    { name: "Maj 7th (no 5th)", offsets: [0, 4, 11], weight: 1 },
  ],

  // --- 4 notes (seventh chords) ---------------------------------------------
  4: [
    { name: "Dominant 7th",    offsets: [0, 4, 7, 10], weight: 3 },
    { name: "Major 7th",       offsets: [0, 4, 7, 11], weight: 3 },
    { name: "Minor 7th",       offsets: [0, 3, 7, 10], weight: 3 },
    { name: "Half-dim 7th",    offsets: [0, 3, 6, 10], weight: 1 },
    { name: "Diminished 7th",  offsets: [0, 3, 6, 9],  weight: 1 },
  ],
};
const SETTINGS = {
  // How often each note-count appears. Only counts listed here are used, and
  // the numbers are relative (these happen to be percentages: 50 / 35 / 15).
  // To drill 2-note only: set this to { 2: 1 }.
  countWeights: { 2: 50, 3: 35, 4: 15 },

  // Play triads / 7ths in a random inversion for voicing variety. The number
  // of notes is unchanged, so it doesn't affect the answer.
  randomInversions: true,

  // Pitch of the lowest note. Drawn around rootCenter with a spread, so most
  // chords sit in the middle octave and occasionally stray higher/lower.
  // Always kept within [rootLow, rootHigh].
  rootCenter: "C4",
  rootSpread: 4, // semitones; larger = more spread away from the centre
  rootLow: "G3",
  rootHigh: "G4",

  // Playback timing.
  questionPauseSeconds: 0.6, // silence before the chord plays at the start of each question
  noteSeconds: 3,        // how long the chord rings each time
  buttonsAvailableSeconds: 2, // answer buttons unlock this many seconds after chord starts
  repeats: 2,            // how many times the chord is played
  gapSeconds: 0.6,       // silence between the repeats
  brokenNoteSeconds: 0.7,// per-note length when played broken (feedback)
  feedbackPauseSeconds: 1.0, // pause before broken playback so the question chord fades
};


// ===== src/audio.js =====

const TONE_LIB        = "https://esm.sh/tone@14.7.77";
const SALAMANDER_BASE = "https://tonejs.github.io/audio/salamander/";

// Samples recorded every minor third; Tone.js pitch-shifts the rest.
const SAMPLE_URLS = (() => {
  const urls = {};
  for (let oct = 0; oct <= 7; oct++) {
    for (const r of ["A", "C", "D#", "F#"]) {
      if (oct === 0 && r !== "A") continue;
      urls[`${r}${oct}`] = `${r.replace("#", "s")}${oct}.mp3`;
    }
  }
  urls["C8"] = "C8.mp3";
  return urls;
})();

// ---------------------------------------------------------------------------
//  PianoEngine
//
//  Each question / feedback sequence gets a brand-new Sampler instance via
//  reset().  That guarantees complete audio isolation: notes from a previous
//  question literally cannot bleed into the next one because they belong to a
//  disposed audio graph.
//
//  Tone.js caches AudioBuffer data globally by URL, so reset() is
//  instantaneous after the first init() — it just creates new Web Audio nodes
//  wired to already-decoded PCM data.
// ---------------------------------------------------------------------------
class PianoEngine {
  constructor() {
    this._Tone    = null;
    this._sampler = null;
    this._out     = null; // Tone.Gain → Tone.Destination
  }

  // Call once from a user-gesture handler (browser audio policy).
  // Loads Tone.js and the piano samples; subsequent calls are no-ops.
  async init() {
    if (this._Tone) {
      if (this._Tone.context.state === "suspended") await this._Tone.start();
      return;
    }
    const mod = await import(TONE_LIB);
    this._Tone = mod.Sampler ? mod : (mod.default || mod);
    await this._Tone.start();
    await this._newSampler();
  }

  // Dispose the current Sampler and create a fresh one.
  // Must be called before each question and each feedback sequence so that
  // notes from a previous context cannot reach the new output.
  // Fast after init() because AudioBuffer data is already cached.
  async reset() {
    this._disposeSampler();
    await this._newSampler();
  }

  // Ramp output to silence immediately.  Called on every transition so the
  // user hears an instant cutoff while reset() sets up the next context.
  stop() {
    if (this._out) this._out.gain.rampTo(0.001, 0.05);
  }

  playChord(notes, dur) {
    const names = notes.map(midiToName);
    const vel   = 0.8 / Math.sqrt(names.length);
    this._sampler.triggerAttackRelease(names, dur, this._Tone.now() + 0.05, vel);
    return sleep((dur + 0.5) * 1000);
  }

  playBroken(notes, noteDur) {
    const names = [...notes].sort((a, b) => a - b).map(midiToName);
    const t0    = this._Tone.now() + 0.05;
    names.forEach((n, i) =>
      this._sampler.triggerAttackRelease(n, noteDur, t0 + i * noteDur, 0.85)
    );
    return sleep((names.length * noteDur + 0.5) * 1000);
  }

  async _newSampler() {
    this._out = new this._Tone.Gain(1).toDestination();
    this._sampler = new this._Tone.Sampler({
      urls: SAMPLE_URLS,
      baseUrl: SALAMANDER_BASE,
      release: 1.2,
    }).connect(this._out);
    this._sampler.volume.value = -6;
    await this._Tone.loaded(); // instant when buffers are already cached
  }

  _disposeSampler() {
    if (this._sampler) { try { this._sampler.dispose(); } catch (_) {} }
    if (this._out)     { try { this._out.dispose();     } catch (_) {} }
    this._sampler = null;
    this._out     = null;
  }
}


// ===== src/app.js =====



const INVERSION_LABEL = ["", " (1st inv)", " (2nd inv)", " (3rd inv)"];

const engine = new PianoEngine();

const questionCountSelect = document.getElementById("question-count");

// ---- Build the question list for a session -------------------------------

// Normal draw kept inside [lo, hi] by re-rolling, so the bell curve isn't
// flattened into a spike at the edges (falls back to clamp after a few tries).
function drawRoot(center, spread, lo, hi) {
  for (let t = 0; t < 20; t++) {
    const r = Math.round(randNormal(center, spread));
    if (r >= lo && r <= hi) return r;
  }
  return clamp(Math.round(randNormal(center, spread)), lo, hi);
}

function pickItems(n) {
  const counts = Object.keys(SETTINGS.countWeights).map(Number);
  for (const c of counts) {
    if (!LIBRARY[c] || LIBRARY[c].length === 0)
      throw new Error(`countWeights includes ${c} but LIBRARY[${c}] is empty.`);
  }

  const center = noteNameToMidi(SETTINGS.rootCenter);
  const lo = noteNameToMidi(SETTINGS.rootLow);
  const hi = noteNameToMidi(SETTINGS.rootHigh);

  const questions = [];
  for (let i = 0; i < n; i++) {
    // Layer 1: how many notes.
    const count = weightedChoice(counts, (c) => SETTINGS.countWeights[c]);
    // Layer 2: which pattern of that size.
    const item = weightedChoice(LIBRARY[count], (it) => it.weight);

    // Optional inversion (voicing only — count is unchanged).
    let inv = 0;
    let offsets = item.offsets;
    if (SETTINGS.randomInversions && count >= 3) {
      inv = randInt(0, count - 1);
      offsets = invert(offsets, inv);
    }

    // Root biased to the middle of the range (rejection-sampled so the tails
    // don't pile up on the boundaries).
    const root = drawRoot(center, SETTINGS.rootSpread, lo, hi);
    const notes = offsets.map((o) => root + o);
    questions.push({ item, notes, count, inv });
  }
  return questions;
}

// ---- Session state -------------------------------------------------------

const state = {
  questions: [],
  index: 0,
  answers: [], // { question, chosen, correct }
};

// ---- DOM refs ------------------------------------------------------------

const screens = {
  start: document.getElementById("screen-start"),
  question: document.getElementById("screen-question"),
  summary: document.getElementById("screen-summary"),
};
const el = {
  progress: document.getElementById("progress"),
  status: document.getElementById("status"),
  choices: document.getElementById("choices"),
  replayChord: document.getElementById("replay-chord"),
  feedback: document.getElementById("feedback"),
  next: document.getElementById("next-btn"),
  summaryBody: document.getElementById("summary-body"),
};

function show(name) {
  for (const key of Object.keys(screens)) {
    screens[key].classList.toggle("hidden", key !== name);
  }
}

// ---- Flow ----------------------------------------------------------------

document.getElementById("start-btn").addEventListener("click", async (e) => {
  const startBtn = e.currentTarget;
  startBtn.disabled = true;
  startBtn.textContent = "Loading piano…";
  await engine.init();
  startBtn.disabled = false;
  startBtn.textContent = "Start practice";
  const n = Math.max(1, parseInt(questionCountSelect.value, 10) || 10);
  state.questions = pickItems(n);
  state.index = 0;
  state.answers = [];
  show("question");
  presentQuestion();
});

let answered = false;
let playToken = 0;
let feedbackToken = 0; // hoisted here so stopAll() can see both tokens

// Single choke point: invalidates all in-flight audio loops and disconnects
// the audio engine output so already-scheduled notes play into silence.
function stopAll() {
  answered = true;
  playToken++;
  feedbackToken++;
  engine.stop();
}

async function presentQuestion() {
  stopAll();
  await engine.reset(); // fresh sampler — notes from the previous question are gone
  const q = state.questions[state.index];
  answered = false;
  const myToken = ++playToken; // re-arm after stopAll() incremented it
  el.progress.textContent = `Question ${state.index + 1} of ${state.questions.length}`;
  el.feedback.innerHTML = "";
  el.feedback.className = "feedback";
  el.next.classList.add("hidden");
  el.replayChord.classList.add("hidden");
  setChoicesEnabled(false);

  // Start the chord, unlock buttons after buttonsAvailableSeconds, then wait
  // for the full chord to finish before starting the gap + repeat.
  el.status.textContent = listenLabel(1);
  await sleep(SETTINGS.questionPauseSeconds * 1000);
  if (myToken !== playToken) return;
  const chordDone = engine.playChord(q.notes, SETTINGS.noteSeconds);

  await sleep(SETTINGS.buttonsAvailableSeconds * 1000);
  if (!answered && myToken === playToken) setChoicesEnabled(true);

  await chordDone;
  playRemainingRepeats(q, myToken);
}

function listenLabel(n) {
  return SETTINGS.repeats > 1 ? `Listen… (${n}/${SETTINGS.repeats})` : "Listen…";
}

async function playRemainingRepeats(q, myToken) {
  for (let r = 1; r < SETTINGS.repeats; r++) {
    await sleep(SETTINGS.gapSeconds * 1000);
    if (answered || myToken !== playToken) return;
    el.status.textContent = listenLabel(r + 1);
    await engine.playChord(q.notes, SETTINGS.noteSeconds);
  }
  if (!answered && myToken === playToken) {
    el.status.textContent = "How many notes did you hear?";
  }
}

function setChoicesEnabled(on) {
  for (const btn of el.choices.querySelectorAll("button")) btn.disabled = !on;
}

el.replayChord.addEventListener("click", () => {
  startFeedbackPlayback(state.questions[state.index]);
});

async function playFeedbackSequence(q, token) {
  await engine.reset(); // fresh sampler — question-chord notes cannot bleed into feedback
  await sleep(SETTINGS.feedbackPauseSeconds * 1000);
  if (token !== feedbackToken) return;
  await engine.playBroken(q.notes, SETTINGS.brokenNoteSeconds);
  if (token !== feedbackToken) return;
  await sleep(SETTINGS.gapSeconds * 1000);
  if (token !== feedbackToken) return;
  await engine.playChord(q.notes, SETTINGS.noteSeconds);
}

function startFeedbackPlayback(q) {
  stopAll();
  const token = ++feedbackToken; // re-arm after stopAll() incremented it
  playFeedbackSequence(q, token);
}

for (const btn of el.choices.querySelectorAll("button")) {
  btn.addEventListener("click", () => onAnswer(parseInt(btn.dataset.count, 10)));
}

function onAnswer(chosen) {
  const q = state.questions[state.index];
  const correct = chosen === q.count;
  state.answers.push({ question: q, chosen, correct });

  stopAll(); // cancel question repeats and cut any ringing note

  setChoicesEnabled(false);
  el.status.textContent = "";

  const names = [...q.notes].sort((a, b) => a - b).map(midiToName).join(" – ");
  el.feedback.className = "feedback " + (correct ? "right" : "wrong");
  el.feedback.innerHTML = `
    <p class="verdict">${correct ? "✓ Correct!" : "✗ Not quite."}</p>
    <p>It had <strong>${q.count}</strong> notes — ${q.item.name}${INVERSION_LABEL[q.inv]}.</p>
    <p class="notes">${names}</p>
    <p class="hint">Listen to each note separately, then together…</p>`;

  el.replayChord.classList.remove("hidden");
  el.replayChord.disabled = false;
  el.next.classList.remove("hidden");
  startFeedbackPlayback(q);
}

el.next.addEventListener("click", () => {
  state.index++;
  if (state.index >= state.questions.length) showSummary();
  else presentQuestion();
});

function showSummary() {
  stopAll();
  const total = state.answers.length;
  const right = state.answers.filter((a) => a.correct).length;
  const pct   = Math.round(100 * right / total);
  const missed = state.answers.filter((a) => !a.correct);

  let html = `<p class="score">${right} / ${total}</p>`;
  html += `<p class="score-pct">${pct}% correct</p>`;
  if (missed.length === 0) html += `<p class="perfect">Perfect score!</p>`;
  el.summaryBody.innerHTML = html;
  show("summary");
}

document.getElementById("again-btn").addEventListener("click", () => {
  show("start");
});

</script>
</body>
</html>
